<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Materiality Agent 2026 — v1.2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>Materiality Agent 2026</h1>
        <p>AI-powered fiscal validation system</p>
    </header>

    <!-- Upload -->
    <div class="upload-box">
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload XML</button>
    </div>

    <!-- Status -->
    <div id="status" class="status">Flow: Waiting</div>

    <!-- Chat -->
    <div id="chat" class="chat"></div>

    <!-- Input -->
    <div class="input-area">
        <input id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
